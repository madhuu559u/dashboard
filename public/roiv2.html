                            <td className="px-3 py-2 mono font-bold text-blue-400" data-label="Train-4">{t.t4}</td>
                            <td className="px-3 py-2 mono text-xs text-slate-400" data-label="Train-6">{t.t6}</td>
                            <td className="px-3 py-2 text-xs" data-label="Terminal">{t.term}</td>
                            <td className="px-3 py-2 text-xs text-slate-400" data-label="Issues">{t.iss.join(' • ')}</td>
                            <td className="px-3 py-2" data-label="Impact"><span className={`text-[10px] font-bold px-2 py-0.5 rounded ${ic(t.imp)}`}>{t.imp}</span></td>
                        </tr>
                    ))}
                </tbody></table>
            </div>

            {/* Constraints */}
            <div className="glass rounded-xl p-5 sm:p-6">
                <h3 className="font-bold text-lg mb-4">§14 — Constraints (click to expand)</h3>
                <div className="space-y-2">
                    {D.constraints.map((c,i)=>(
                        <div key={i} className={`gl rounded-lg p-3 cursor-pointer transition-colors hover:bg-white/[0.06] ${c.ty==='Physical'?'border-l-2 border-blue-500':'border-l-2 border-purple-500'}`} onClick={()=>setXc(xc===i?-1:i)}>
                            <div className="flex items-center gap-2 flex-wrap">
                                <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${c.ty==='Physical'?'bg-blue-500/20 text-blue-400':'bg-purple-500/20 text-purple-400'}`}>{c.ty}</span>
                                <span className="font-semibold text-sm flex-1 min-w-0">{c.n}</span>
                                <span className="text-[10px] text-slate-500 flex-shrink-0">📍 {c.loc}</span>
                            </div>
                            {xc===i&&(
                                <div className="mt-3 pt-3 border-t border-white/5 grid sm:grid-cols-3 gap-3 text-xs">
                                    <div><p className="text-slate-500 text-[10px] uppercase mb-1">Root Cause</p><p className="text-slate-300">{c.ca}</p></div>
                                    <div><p className="text-slate-500 text-[10px] uppercase mb-1">Solution</p><p className="text-green-400">{c.sol}</p></div>
                                    <div><p className="text-slate-500 text-[10px] uppercase mb-1">Indicators</p><p className="text-amber-400">{c.ind}</p></div>
                                </div>
                            )}
                        </div>
                    ))}
                </div>
            </div>

            {/* Lessons */}
            <div className="glass rounded-xl p-5 sm:p-6">
                <h3 className="font-bold text-lg mb-4">§13 — Lessons Learned & SOPs</h3>
                <div className="space-y-4">
                    {D.lessons.map((l,i)=>(
                        <div key={i} className="gl rounded-xl p-4 sm:p-5 border border-green-500/20">
                            <p className="font-semibold text-sm text-red-400 mb-2">Issue: {l.issue}</p>
                            <p className="text-xs text-cyan-300 mb-3 italic">"{l.insight}"</p>
                            <div className="bg-slate-900/50 rounded-lg p-3">
                                <div className="flex items-center justify-between mb-2">
                                    <p className="text-[10px] text-slate-500 uppercase font-bold tracking-wider">Standard Operating Procedure</p>
                                    <div className="flex gap-1">
                                        <span className="text-[9px] px-2 py-0.5 bg-green-500/20 text-green-400 rounded cursor-pointer">✓ Approve</span>
                                        <span className="text-[9px] px-2 py-0.5 bg-red-500/20 text-red-400 rounded cursor-pointer">✕ Reject</span>
                                        <span className="text-[9px] px-2 py-0.5 bg-blue-500/20 text-blue-400 rounded cursor-pointer">✎ Edit</span>
                                    </div>
                                </div>
                                {l.sop.split('\n').map((step,j)=>(<p key={j} className="text-xs text-slate-300 mb-1">{step}</p>))}
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );
}
